services:
  buckett:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: buckett:latest
    container_name: buckett
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PUBLIC_BASE_URL: http://localhost:3001
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
